<!html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <title>Guiminamflix</title>
</head>

<body>
    <header>GUIMINAMFLIX</header>

    <!-- Destaque Principal -->
    <section class="chamada">
        <div class="chamada-texto">
            <h1>OSCAR DE ANIMAÇÃO</h1>
            <p>#cinema #animacao #oscar</p>
        </div>
        <div>
            <!-- Vídeo de Destaque: Oscar de Animação 2023 -->
            <iframe width="560" height="315" src="https://youtube.com"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
    </section>

    <!-- Carrossel de Categorias -->
    <section class="categoria">
        <h2>Análises e Lançamentos Imperdíveis</h2>
        <div class="categoria-videos">
            
            <!-- Card 1: Oscar de Animação 2023 -->
            <a href="https://www.youtube.com/watch?v=cs15QqG6Gjc" target="_blank" title="Oscar de Animação 2023">
                <img src="https://img.youtube.com/vi/cs15QqG6Gjc/maxresdefault.jpg" alt="Oscar de Animação 2023" />
            </a>

            <!-- Card 2: Lançamentos mais Esperados de 2024 -->
            <a href="https://www.youtube.com/watch?v=nCmIwcycUJ8" target="_blank" title="Mais Esperados de 2024">
                <img src="https://img.youtube.com/vi/nCmIwcycUJ8/maxresdefault.jpg" alt="Mais Esperados de 2024" />
            </a>

            <!-- Card 3: One Piece Live-Action Review -->
            <a href="https://www.youtube.com/watch?v=FvRmEapoHRc" target="_blank" title="One Piece Live-Action">
                <img src="https://img.youtube.com/vi/FvRmEapoHRc/maxresdefault.jpg" alt="One Piece Live Action" />
            </a>

            <!-- Card 4: O Homem-Aranha no Aranhaverso Vale a Pena? -->
            <a href="https://youtube.com" target="_blank" title="Aranhaverso Vale a Pena?">
                <img src="https://youtube.com" alt="Review Aranhaverso" />
            </a>

            <!-- Card 5: Ruptura (Apple TV+) Analise -->
            <a href="https://youtube.com" target="_blank" title="Ruptura - Apple TV+">
                <img src="https://youtube.com" alt="Análise Ruptura" />
            </a>

        </div>
    </section>

</body>

</html>
